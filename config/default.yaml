# Base configuration for the adaptive-scm experiments.
# Override per-component via config/{forecasters,policies,experiments}/*.yaml.

data:
  raw_dir: data/raw
  processed_dir: data/processed
  product_store:
    item_id: FOODS_3_090
    store_id: CA_1
  splits:
    train_days: 1597
    val_days: 28
    test_days: 28

simulation:
  costs:
    holding_per_unit_per_day: 0.05
    stockout_per_unit: 2.00
    fixed_order: 10.00
    purchase_per_unit: 1.00
  lead_time:
    base: 3
    stochastic_max_additional: 2
  episode:
    length: 28
    training_length: 365
  noise:
    distribution: lognormal

experiments:
  conditions:
    - baseline
    - demand_spike
    - lead_time_disruption
  disruption_window:
    start_day: 7
    duration_days: 14
  demand_spike_multiplier: 1.5
  lead_time_disruption_multiplier: 2.0
  replications: 30

forecasters:
  arima:
    seasonal: true
    seasonal_period: 7
    information_criterion: aic
  xgboost:
    grid_search:
      max_depth: [3, 6, 9]
      learning_rate: [0.01, 0.05, 0.1]
      n_estimators: [100, 300, 500]
      reg_lambda: [0, 0.1, 1.0]
    early_stopping_rounds: 20
  tft:
    learning_rate: 0.001
    batch_size: 64
    max_epochs: 50
    early_stopping_patience: 10
    quantiles: [0.1, 0.5, 0.9]
    hidden_size: 16
    attention_head_size: 4
    encoder_length: 56
    accelerator: cpu

policies:
  eoq:
    service_level: 0.95
  order_up_to:
    review_period: 1
    service_level: 0.95
  ppo:
    total_timesteps: 500000
    clip_range: 0.2
    gamma: 0.99
    gae_lambda: 0.95
    learning_rate: 0.0003
    batch_size: 64
    n_epochs: 4
    n_steps: 2048
    policy_net: [64, 64]
    activation: tanh
