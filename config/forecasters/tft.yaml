# Override fragment for the TFT forecaster. Composed with config/default.yaml.
learning_rate: 0.001
batch_size: 64
max_epochs: 50
early_stopping_patience: 10
quantiles: [0.1, 0.5, 0.9]
hidden_size: 16
attention_head_size: 4

# Encoder window in days (additive knob, D-4.3). 56 = 8 weeks = 2x horizon.
encoder_length: 56
