# Temporal Fusion Transformer forecaster configuration (PRD Feature 4 / §5)

forecaster:
  name: tft
  learning_rate: 0.001
  batch_size: 64
  max_epochs: 50
  early_stopping_patience: 10
  quantiles: [0.1, 0.5, 0.9]
  hidden_size: 16
  attention_head_size: 4
  dropout: 0.1
  hidden_continuous_size: 8
  max_encoder_length: 90
  max_prediction_length: 28
