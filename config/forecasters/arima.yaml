# Override fragment for the ARIMA forecaster. Composed with config/default.yaml.
seasonal: true
seasonal_period: 7
information_criterion: aic

# Search-space bounds (additive to the PRD schema). Defaults mirror
# pmdarima.auto_arima; tighten these to speed up the order search.
max_p: 5
max_q: 5
max_P: 2
max_Q: 2
max_d: 2
max_D: 1
stepwise: true
