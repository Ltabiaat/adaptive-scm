# XGBoost forecaster configuration (PRD Feature 3 / §5)

forecaster:
  name: xgboost
  grid_search:
    max_depth: [3, 6, 9]
    learning_rate: [0.01, 0.05, 0.1]
    n_estimators: [100, 300, 500]
    reg_lambda: [0, 0.1, 1.0]
  early_stopping_rounds: 20
  objective: reg:squarederror
  tree_method: hist
  n_jobs: -1
